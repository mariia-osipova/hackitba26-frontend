<!DOCTYPE html>
<html lang="es">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>SuperShop — QUE QUIERES COMPRAR HOY?</title>
    <link rel="icon" type="image/png" href="https://c.animaapp.com/Y5zUzjcR/img/group-23@6x.png" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="chat-styleguide.css" />
    <link rel="stylesheet" href="chat-style.css" />
  </head>
  <body>
    <div class="desktop">

      <!-- Navigation -->
      <nav class="nav-chat" aria-label="Main navigation">
        <a href="index.html" class="nav-home" aria-label="Home">Home</a>
        <div class="find-bar"></div>
        <button class="nav-icon-btn" type="button" aria-label="Chat">
          <img class="img" src="https://c.animaapp.com/ZM2jsSkD/img/chat-icon-1@2x.png" alt="" aria-hidden="true" />
        </button>
        <button class="nav-icon-btn" type="button" aria-label="Perfil">
          <img class="profile-icon" src="https://c.animaapp.com/ZM2jsSkD/img/profile-icon@2x.png" alt="" aria-hidden="true" />
        </button>
        <button class="nav-icon-btn" type="button" aria-label="Favoritos">
          <img class="img" src="https://c.animaapp.com/ZM2jsSkD/img/icon-of-favorites@2x.png" alt="" aria-hidden="true" />
        </button>
        <button class="nav-cart-btn" id="nav-cart-btn" aria-label="Ver carrito">
          <img class="cart-icon" src="https://c.animaapp.com/ZM2jsSkD/img/cart-icon@2x.png" alt="" aria-hidden="true" />
          <span class="cart-badge hidden" id="cart-badge">0</span>
        </button>
        <a href="#" class="nav-contact">Contact</a>
      </nav>

      <!-- Chat area -->
      <main class="main">
        <div class="chat-layout">

          <!-- Chat column -->
          <div class="chat-column">
            <!-- Thread -->
            <div class="chat-thread-wrapper">
              <div class="chat-empty-state" id="chat-empty">
                <h1 class="heading">QUE QUIERES COMPRAR HOY?</h1>
              </div>
              <div class="chat-thread" id="chat-thread"></div>
            </div>

            <!-- Input bar -->
            <div class="chat-input-bar">
              <label for="chat-input" class="sr-only">Escribe tu pedido</label>
              <input
                id="chat-input"
                class="chat-input"
                type="text"
                placeholder="Me gustaria hacer una compra para este mes..."
                autocomplete="off"
              />
              <button class="chat-submit" id="btn-send" type="button" aria-label="Enviar">
                <img class="chat-submit-icon" src="https://c.animaapp.com/ZM2jsSkD/img/vector1-1@2x.png" alt="Enviar" />
              </button>
            </div>
          </div>

          <!-- Cart panel -->
          <aside class="cart-panel hidden" id="cart-panel" aria-label="Carrito">
            <div class="cart-panel__header">
              <span class="cart-panel__title">Tu carrito</span>
              <button class="cart-panel__close" id="cart-close" aria-label="Cerrar carrito">✕</button>
            </div>
            <div class="cart-items" id="cart-items">
              <p class="cart-empty hidden" id="cart-empty-msg">Tu carrito está vacío.</p>
            </div>
            <div class="cart-footer hidden" id="cart-footer">
              <div class="cart-total">Total: <span id="cart-total">$0.00</span></div>
              <button class="cart-checkout" id="btn-checkout">Confirmar pedido</button>
            </div>
          </aside>

        </div>
      </main>

      <!-- Clarification modal -->
      <div class="modal hidden" id="clarification-modal">
        <div class="modal__overlay"></div>
        <div class="modal__box" role="dialog" aria-modal="true" aria-labelledby="modal-question">
          <h2 class="modal__question" id="modal-question"></h2>
          <form id="clarification-form">
            <fieldset class="modal__fieldset">
              <legend class="sr-only">Opciones de aclaración</legend>
              <div class="modal__options" id="modal-options"></div>
            </fieldset>
            <p class="modal__error hidden" id="modal-error" aria-live="polite"></p>
            <div class="modal__actions">
              <button class="modal-btn modal-btn--primary" id="modal-confirm" type="submit" disabled>Confirmar</button>
              <button class="modal-btn modal-btn--secondary" id="modal-cancel" type="button">Cancelar</button>
            </div>
          </form>
        </div>
      </div>

    </div>
    <script src="chat-app.js"></script>
  </body>
</html>
