<!DOCTYPE html>
<html lang="es">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Que Quieres Comprar Hoy — SuperShop</title>
    <link rel="icon" type="image/png" href="https://c.animaapp.com/Y5zUzjcR/img/group-23@6x.png" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="chat-styleguide.css" />
    <link rel="stylesheet" href="chat-style.css" />
  </head>
  <body>
    <div class="desktop">
      <!-- Navigation -->
      <nav class="nav-chat" aria-label="Main navigation">
        <a href="index.html" class="nav-home" aria-label="Home">Home</a>
        <div class="find-bar" role="search" aria-label="Search bar"></div>
        <a href="#" aria-label="Chat">
          <img class="img" src="https://c.animaapp.com/ZM2jsSkD/img/chat-icon-1@2x.png" alt="Chat" />
        </a>
        <a href="#" aria-label="Profile">
          <img class="profile-icon" src="https://c.animaapp.com/ZM2jsSkD/img/profile-icon@2x.png" alt="Profile" />
        </a>
        <a href="#" aria-label="Favorites">
          <img class="img" src="https://c.animaapp.com/ZM2jsSkD/img/icon-of-favorites@2x.png" alt="Favorites" />
        </a>
        <a href="#" aria-label="Cart">
          <img class="cart-icon" src="https://c.animaapp.com/ZM2jsSkD/img/cart-icon@2x.png" alt="Cart" />
        </a>
        <a href="#" class="nav-contact" aria-label="Contact">Contact</a>
      </nav>

      <!-- Main content -->
      <main class="main">
        <section class="resources-title">
          <h1 class="heading">QUE QUIERES COMPRAR HOY?</h1>
          <div class="search-bar-wrapper">
            <form class="search-form" role="search" onsubmit="return false;">
              <label for="purchase-input" class="sr-only">¿Qué quieres comprar?</label>
              <input
                id="purchase-input"
                class="search-input"
                type="text"
                placeholder="Me gustaria hacer una compra para este mes..."
              />
              <button class="search-submit" type="submit" aria-label="Buscar">
                <img class="search-icon" src="https://c.animaapp.com/ZM2jsSkD/img/vector1-1@2x.png" alt="Buscar" />
              </button>
            </form>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
